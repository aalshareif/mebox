<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Your Brand Name | Professional Minimalist Landing Page</title>
    <meta name="description" content="A clean, minimalist landing page showcasing modern design principles and high-performance hosting.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://yourdomain.com/">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com/">
    <meta property="og:title" content="Your Brand Name | Professional Minimalist Landing Page">
    <meta property="og:description" content="A clean, minimalist landing page showcasing modern design principles and high-performance hosting.">
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://yourdomain.com/">
    <meta property="twitter:title" content="Your Brand Name | Professional Minimalist Landing Page">
    <meta property="twitter:description" content="A clean, minimalist landing page showcasing modern design principles and high-performance hosting.">

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --sub-text-color: #666666;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        main {
            text-align: center;
            max-width: 600px;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.125rem;
            color: var(--sub-text-color);
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <main>
        <h1>Welcome to Your Site</h1>
        <p>This is a clean, lightning-fast landing page. Your custom domain is now successfully connected and serving traffic over HTTPS through Cloudflare.</p>
    </main>

</body>
</html>
